  <!-- Scripts -->
  <script type="module">
    import { loadCalendar, loadMergedCalendar } from './js/data.js?v=10';
    import { buildWheel } from './js/wheel.js?v=10';
    import { initSidebar, refreshSidebar } from './js/sidebar.js?v=10';
    import { initRotation } from './js/rotation.js?v=10';
    import { initSources, getActiveSourceIds } from './js/sources.js?v=10';
    import { initSpin } from './js/spin.js?v=10';

    async function init() {
      try {
        // Базовый календарь для колеса (всегда Стрижёв)
        const calendar = await loadCalendar();
        buildWheel(calendar);
        initRotation(calendar);
        initSpin(document.getElementById('wheel-svg'), calendar);

        // Мультиисточниковый для sidebar
        const activeIds = getActiveSourceIds();
        const merged = await loadMergedCalendar(activeIds);
        initSidebar(merged);

        // Инициализация тогглов
        await initSources(async (newIds, newMerged) => {
          initSidebar(newMerged);
          refreshSidebar();
        });

        // Show current date in header
        const todayEl = document.getElementById('header-today');
        if (todayEl) {
          const now = new Date();
          const months = ['января','февраля','марта','апреля','мая','июня',
                          'июля','августа','сентября','октября','ноября','декабря'];
          todayEl.textContent = `Сегодня ${now.getDate()} ${months[now.getMonth()]}`;
        }
      } catch (err) {
        const container = document.getElementById('wheel-container');
        const p = document.createElement('p');
        p.textContent = err.message;
        p.setAttribute('style', 'text-align:center;padding:2rem;color:#8b5e3c;');
        container.appendChild(p);
      }
    }
    init();

    // ── Тумблер цветовой схемы (3 позиции) ──
    const toggle = document.getElementById('scheme-toggle');
    const SCHEMES = ['', 'scheme-color', 'scheme-full'];
    const SCHEME_LABELS = ['ч/б', 'пастель', 'цвет'];
    let schemeVal = 2; // default: цвет (scheme-full)

    function applyScheme() {
      document.body.classList.remove('scheme-color', 'scheme-full');
      const cls = SCHEMES[schemeVal];
      if (cls) document.body.classList.add(cls);
      toggle.setAttribute('aria-valuenow', schemeVal);
      toggle.setAttribute('aria-valuetext', SCHEME_LABELS[schemeVal]);
      // Подсветить активную подпись
      document.querySelectorAll('.scheme-label').forEach(l => {
        l.classList.toggle('active', parseInt(l.dataset.pos) === schemeVal);
      });
      document.dispatchEvent(new CustomEvent('scheme:changed'));
    }

    toggle.addEventListener('click', () => {
      schemeVal = (schemeVal + 1) % 3;
      applyScheme();
    });

    // Keyboard: arrow keys
    toggle.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
        e.preventDefault();
        schemeVal = Math.min(2, schemeVal + 1);
        applyScheme();
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
        e.preventDefault();
        schemeVal = Math.max(0, schemeVal - 1);
        applyScheme();
      }
    });

    applyScheme(); // установить начальное состояние

    // ── Wheel interaction: zoom only (rotation handled by spin.js) ──
    (function initZoom() {
      const container = document.getElementById('wheel-container');
      const svg = document.getElementById('wheel-svg');
      if (!container || !svg) return;

      let scale = 1;

      function applyZoom(animated) {
        if (animated) {
          svg.style.transition = 'transform 0.28s ease-out';
          setTimeout(() => { svg.style.transition = ''; }, 300);
        }
        svg.style.transform = `scale(${scale})`;
      }

      // ── Zoom via scroll wheel ──
      container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const step = 0.12;
        const delta = e.deltaY < 0 ? step : -step;
        scale = Math.max(0.4, Math.min(4, scale + delta));
        applyZoom(false);
      }, { passive: false });

      // ── Double-click: reset zoom (rotation reset handled by spin.js) ──
      container.addEventListener('dblclick', () => {
        scale = 1;
        applyZoom(true);
      });

      // ── Pinch-to-zoom on touch ──
      let initDist = null, initScalePinch = 1;

      container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          initDist = Math.hypot(dx, dy);
          initScalePinch = scale;
        }
      }, { passive: true });

      container.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initDist !== null) {
          e.preventDefault();
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.hypot(dx, dy);
          scale = Math.max(0.4, Math.min(4, initScalePinch * (dist / initDist)));
          applyZoom(false);
        }
      }, { passive: false });

      container.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) initDist = null;
      }, { passive: true });
    })();
  </script>
